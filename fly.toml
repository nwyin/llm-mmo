# Fly.io config for the llm-mmo Discord bot.
#
# The bot is a WORKER: it opens an outbound WebSocket to Discord's gateway and
# needs NO inbound ports — so there is intentionally no [http_service] / [[services]]
# block. (Adding one would make Fly health-check a port the bot never opens and
# kill the machine.)
#
# Build context is the repo root (this file's directory) so knowledge/, personas/,
# .agents/skills/ and .git/ are copied into the image; the Dockerfile lives in bot/.
#
# First deploy:
#   fly launch --no-deploy            # pick a UNIQUE app name + region (rewrites `app` below)
#   fly volumes create llm_mmo_data --size 1 --region <your-region>   # persistent state
#   fly secrets set \
#       DISCORD_BOT_TOKEN=... \
#       OPENROUTER_API_KEY=sk-or-... \
#       GITHUB_DISPATCH_TOKEN=... \
#       GITHUB_REPO=youruser/yourfork \
#       DISCORD_GUILD_ID=...          # optional, for instant slash-command sync
#   fly deploy
#
# Knowledge refresh after merges: set [knowledge].pull_interval_seconds > 0 in
# bot/config.toml and the running bot `git pull`s itself; otherwise `fly deploy` again.

app = "llm-mmo-bot"          # CHANGE ME — must be globally unique across Fly
primary_region = "iad"       # pick one near you: https://fly.io/docs/reference/regions/

[build]
  dockerfile = "bot/Dockerfile"

[env]
  # All mutable runtime state (transcript DB, cron jobs, live memory, runtime skills)
  # lives here, on the persistent volume mounted below.
  STATE_DIR = "/data"

# Persistent state. A Fly volume is single-attach, which also enforces the bot's
# single-instance requirement (one gateway connection; cron must not double-fire).
# Keep this app at exactly one machine: `fly scale count 1`.
[mounts]
  source = "llm_mmo_data"
  destination = "/data"

# One always-on machine. shared-cpu-1x / 256MB is plenty for a gateway bot.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
