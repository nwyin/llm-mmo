# Bot configuration. Non-secret knobs live here; secrets live in .env.

[chat]
# OpenRouter model id used for chat replies. Any model on openrouter.ai works.
model = "anthropic/claude-sonnet-4.6"
# Max knowledge files injected as context per reply.
max_context_files = 6
# Hard cap on characters of knowledge context (keeps token cost bounded).
max_context_chars = 24000
# How many recent messages of channel history to include for continuity.
history_turns = 6
# Max tool-use iterations per reply before the model must answer.
max_iterations = 6

[personas]
# Persona id used when none is specified (file in personas/, without .md). "ops" is tuned for
# startup operations (research, customer feedback, institutional memory); "default" is generic.
default = "ops"
# Optional: pin a persona to specific channels by id.
# [personas.by_channel]
# "123456789012345678" = "thumbnail-scout"

# Mutable runtime state (transcript DB, cron jobs, live MEMORY.md/USER.md, runtime skills)
# lives under STATE_DIR, set in the environment — NOT here, because it is deployment-specific.
# Default: bot/.state (gitignored) for local dev. In production point it at a persistent
# volume: STATE_DIR=/data. The git checkout stays immutable (code + knowledge + seeds).

[knowledge]
# Pull the repo every N seconds so chat stays fresh after merges. 0 = never. When > 0 the bot
# runs `git pull --ff-only` + reloads knowledge in the background (safe: state is outside the
# checkout). Private repos authenticate via GITHUB_DISPATCH_TOKEN.
pull_interval_seconds = 0

[admins]
# Discord user ids (as strings) with privileged access. PRIVILEGED TOOLS FAIL CLOSED:
# cron, workspace_recall, interactive skill_manage, and user-profile (USER.md) writes are
# disabled for everyone when this list is empty. An empty list means "no admins" — never
# "everyone". Set this to your own user id(s) to enable those tools.
#   ids = ["123456789012345678"]
ids = []

[memory]
# Live memory files (MEMORY.md/USER.md) live under STATE_DIR/memory, seeded once from the
# repo's memory/*.md on first boot. Per-file character limit for bot-editable memory.
max_chars = 2000
# Operational memory (MEMORY.md, target=agent) is always writable so the bot can build
# institutional knowledge proactively. `allow_writes` gates ONLY user-profile memory
# (USER.md, target=user), which is additionally restricted to [admins].ids. USER.md is
# shared across the workspace, so keep allow_writes off unless you trust your admins.
allow_writes = false

[skills]
# Directory for curated, git-tracked agentskills.io skill packages (read-only to the agent).
# Agent-written (runtime) skills live under STATE_DIR/memory/skills, not here.
dir = "../.agents/skills"

[web]
# Web research provider. "exa" (recommended) — neural search tuned for research/competitor/
# client discovery; set EXA_API_KEY in .env (get one at https://exa.ai). "tavily" is an
# alternative (TAVILY_API_KEY). "ddgs" is keyless. If the chosen keyed provider has no key,
# the bot falls back to keyless DuckDuckGo so web search still works out of the box.
provider = "exa"
timeout_seconds = 20
# Max characters returned by web_extract for a single page.
max_chars = 8000
# Max results returned by web_search.
max_results = 5

[recall]
# Channel-scoped recall is always on. Set true to also offer a cross-channel workspace_recall
# tool (searches every channel's transcripts) — only ever surfaced to [admins].ids.
workspace_enabled = false

[review]
# Self-improvement loop. After each turn a background fork may save operational memory or
# update a skill (never user profiles). Set enabled=false to turn it off entirely.
enabled = true
# Post a short "🧠 learned: …" notice when the fork saves something.
notify = true
# Max tool-iterations for the review fork.
max_iterations = 4
# Run the review fork once every N turns per channel (1 = every turn). Higher = less LLM spend,
# slower learning. The fork roughly doubles a turn's cost, so keep this >1 for active channels.
interval = 3
# Inject a one-turn reminder to persist memory/skills every N turns (0 disables).
memory_nudge_interval = 10
skill_nudge_interval = 10

[cron]
# Scheduled automations. Only [admins].ids may create jobs in chat ("@bot schedule a daily
# 9am digest…"); with no admins set, the tool is unavailable. Cross-channel targets must be
# text channels the bot can see in this workspace.
enabled = true
# The job store lives at STATE_DIR/cron.json. How often the scheduler checks for due jobs:
tick_seconds = 60

[actions]
# Slash commands map to action names registered in ../workflows/actions.toml.
# The bot dispatches these to GitHub; the matching agent does the work + opens a PR.
save = "save_link"
# Action used by the agent's save_to_kb tool to persist research/notes via a PR.
save_note = "save_note"
